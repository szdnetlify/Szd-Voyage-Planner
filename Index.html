<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voyage Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Leaflet CSS -->
<link rel="stylesheet"
 href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:Segoe UI,Arial,sans-serif;background:#fff}
#map{height:420px}
.container{padding:24px}
.header{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:30px;margin-top:25px}
label{font-weight:600;font-size:13px}
input,select{width:100%;padding:8px;margin:6px 0 12px;border:1px solid #d1d5db;border-radius:4px}
button{background:#1d4ed8;color:#fff;border:none;padding:10px 24px;border-radius:4px;cursor:pointer}
button:hover{background:#1e40af}
.print{background:#059669;margin-top:10px}
.result{border-left:2px solid #e5e7eb;padding-left:20px}
footer{margin-top:30px;font-size:12px;color:#6b7280}

/* PRINT */
@media print{
  body *{visibility:hidden}
  .result,.result *{visibility:visible}
  .result{position:absolute;left:0;top:0;width:100%}
}

.print-header{margin-bottom:14px}
.print-header h2{margin:0 0 8px;font-size:18px}
.print-header p{margin:4px 0;font-size:13px}
@media screen{.print-header{display:none}}
</style>
</head>

<body>

<div id="map"></div>

<div class="container">

<div class="header">
  <div>
    <label>Shipping Line</label>
    <select id="lineSelect" onchange="updateLine()">
      <option value="MAERSK">Maersk Line</option>
      <option value="CMA">CMA CGM</option>
      <option value="OTHER">Other Line</option>
    </select>
    <input id="otherLineName" placeholder="Enter Other Line Name" style="display:none">
  </div>

  <div>
    <label>Vessel Name</label>
    <select id="vesselName" onchange="updateVessel()"></select>
    <input id="manualVessel" placeholder="Enter Vessel Name" style="display:none">
  </div>
</div>

<div class="grid">

<div>
  <h3>Departure</h3>
  <label>Country</label>
  <select id="depCountry" onchange="loadPorts('dep')"></select>
  <label>Port</label>
  <select id="depPort"></select>
  <label>Departure Date & Time</label>
  <input type="datetime-local" id="departureTime">
  <label>Time Mode</label>
  <select id="timeMode">
    <option value="LOCAL">Local</option>
    <option value="UTC">UTC</option>
  </select>
</div>

<div>
  <h3>Arrival / Planning</h3>
  <label>Country</label>
  <select id="arrCountry" onchange="loadPorts('arr')"></select>
  <label>Port</label>
  <select id="arrPort"></select>
  <label>Speed (knots)</label>
  <input id="speed">
  <label>Buffer (hours)</label>
  <input id="buffer">
  <button onclick="calculate()">Calculate</button>
</div>

<div class="result">

<div class="print-header">
  <h2>Voyage Summary</h2>
  <p><b>Shipping Line:</b> <span id="printLine">—</span></p>
  <p><b>Vessel Name:</b> <span id="printVessel">—</span></p>
  <p><b>Route:</b> <span id="printDep">—</span> → <span id="printArr">—</span></p>
  <p><b>Departure Date & Time:</b> <span id="printDeparture">—</span></p>
  <p><b>Report Date:</b> <span id="printDate">—</span></p>
  <hr>
</div>

<h3>Voyage Result</h3>
<p><b>Distance:</b> <span id="dist">—</span> NM</p>
<p><b>Sailing Time:</b> <span id="time">—</span></p>
<p><b>ETA:</b><br><b><span id="eta">—</span></b></p>

<button class="print" onclick="window.print()">Print / Save PDF</button>
</div>

</div>

<footer>
Developed by <b>Sazzad</b> — Vessel and Yard Planner
</footer>

</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* DATA */
const vessels={
MAERSK:{speed:12,buffer:12,list:{
"MAERSK CHATTOGRAM":1,"MAERSK DHAKA":1,"MAERSK SIHANOUKVILLE":1,
"MAERSK YOKOHAMA":1,"MAERSK VLADIVOSTOK":1,
"MCC DANANG":1,"MCC TAIPEI":1,"MCC TOKYO":1,"OTHER-VESSEL":1}},
CMA:{speed:11,buffer:18,list:{
"CMA CGM KINABALU":1,"CMA CGM FUJI":1,"SMOOTH VENTURE":1,
"CALA PAGURO":1,"CNC PADMA":1,"CNC TIGER":1,"OTHER-VESSEL":1}},
OTHER:{speed:"",buffer:"",list:{"OTHER-VESSEL":1}}
};


const ports = {
  Bangladesh: {
    "Chittagong": [22.3, 91.8],
    "RSGT, Patenga Container Terminal": [22.2, 91.77]
  },
  Malaysia: {
    "Port Klang": [3.0, 101.4],
    "Tanjung Pelepas": [1.36, 103.55],
    "Penang": [5.41, 100.34]
  },
  Singapore: {
    "SGSIN": [1.29, 103.85]
  },
  China: {
    "Shanghai": [31.23, 121.47],
    "Ningbo": [29.95, 121.7],
    "Shenzhen (Yantian)": [22.54, 114.23]
  },
  Vietnam: {
    "Ho Chi Minh (VNSGN)": [10.76, 106.7],
    "Hai Phong": [20.85, 106.68],
    "Cai Mep": [10.6, 107.0]
  }
};

/* INIT */
Object.keys(ports).forEach(c=>{
depCountry.add(new Option(c,c));
arrCountry.add(new Option(c,c));
});
function loadPorts(t){
const sel=document.getElementById(t+"Port");sel.innerHTML="";
Object.keys(ports[document.getElementById(t+"Country").value])
.forEach(p=>sel.add(new Option(p,p)));
}
loadPorts("dep");loadPorts("arr");

/* MAP */
const map=L.map("map").setView([10,95],3);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
let route;

/* VESSEL */
function updateLine(){
vesselName.innerHTML="";
manualVessel.style.display="none";
if(lineSelect.value==="OTHER"){
otherLineName.style.display="block";
vesselName.add(new Option("Other Vessel","OTHER-VESSEL"));
speed.value="";buffer.value="";
updateVessel();return;
}
otherLineName.style.display="none";
Object.keys(vessels[lineSelect.value].list)
.forEach(v=>vesselName.add(new Option(v==="OTHER-VESSEL"?"Other Vessel":v,v)));
speed.value=vessels[lineSelect.value].speed;
buffer.value=vessels[lineSelect.value].buffer;
updateVessel();
}
function updateVessel(){
manualVessel.style.display=vesselName.value==="OTHER-VESSEL"?"block":"none";
}
updateLine();

/* CALC */
function hav(a,b){
const R=3440.065;
const toRad=x=>x*Math.PI/180;
const dLat=toRad(b[0]-a[0]), dLon=toRad(b[1]-a[1]);
return R*2*Math.asin(Math.sqrt(
Math.sin(dLat/2)**2+
Math.cos(toRad(a[0]))*Math.cos(toRad(b[0]))*
Math.sin(dLon/2)**2));
}

function calculate(){
if(!departureTime.value){alert("Select departure date & time");return;}
const spd=Number(speed.value); if(!spd||spd<=0){alert("Invalid speed");return;}
const buf=Number(buffer.value)||0;

const dep=ports[depCountry.value][depPort.value];
const arr=ports[arrCountry.value][arrPort.value];

const dist=hav(dep,arr);
const hrs=(dist/spd)+buf;

document.getElementById("dist").textContent=dist.toFixed(0);
document.getElementById("time").textContent=
`${Math.floor(hrs/24)} days ${Math.round(hrs%24)} hours`;

document.getElementById("eta").textContent=
new Date(new Date(departureTime.value).getTime()+hrs*3600000).toLocaleString();

if(route)map.removeLayer(route);
route=L.polyline([dep,[5,95],arr],{color:"#2563eb",dashArray:"6 10"}).addTo(map);
map.fitBounds(route.getBounds(),{padding:[40,40]});

/* PRINT */
printLine.textContent=lineSelect.value==="OTHER"?otherLineName.value:lineSelect.options[lineSelect.selectedIndex].text;
printVessel.textContent=vesselName.value==="OTHER-VESSEL"?manualVessel.value:vesselName.value;
printDep.textContent=depPort.value+", "+depCountry.value;
printArr.textContent=arrPort.value+", "+arrCountry.value;
printDeparture.textContent=new Date(departureTime.value).toLocaleString();
printDate.textContent=new Date().toLocaleString();
}
</script>

</body>
</html>
